<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Review &amp; Rating | Custom Tailoring</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#b7860b",
                        "background-light": "#f8f7f5",
                        "background-dark": "#221d10",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen">
<!-- Main Container -->
<div class="relative flex min-h-screen w-full flex-col items-center justify-center p-4">
<!-- Backdrop -->
<div class="fixed inset-0 bg-background-dark/60 backdrop-blur-sm z-0"></div>
<!-- Modal Style Review Card -->
<div class="relative z-10 w-full max-w-lg bg-white dark:bg-slate-900 rounded-xl shadow-2xl overflow-hidden">
<!-- Close Button -->
<button class="absolute top-4 right-4 text-slate-400 hover:text-primary transition-colors">
<span class="material-symbols-outlined">close</span>
</button>
<!-- Header -->
<div class="p-6 text-center border-b border-slate-100 dark:border-slate-800">
<h2 class="text-2xl font-bold tracking-tight text-slate-900 dark:text-slate-100">Rate Your Experience</h2>
<p class="text-slate-500 dark:text-slate-400 mt-1">How was the quality of your custom order?</p>
</div>
<div class="p-6 space-y-8">
<!-- Main 5-Star Rating -->
<div class="flex flex-col items-center gap-3">
<div class="flex gap-2 text-primary">
<span class="material-symbols-outlined !text-5xl fill-current">star</span>
<span class="material-symbols-outlined !text-5xl fill-current">star</span>
<span class="material-symbols-outlined !text-5xl fill-current">star</span>
<span class="material-symbols-outlined !text-5xl fill-current">star</span>
<span class="material-symbols-outlined !text-4xl text-slate-200 dark:text-slate-700">star</span>
</div>
<span class="text-sm font-semibold text-primary uppercase tracking-wider">Great</span>
</div>
<!-- Sub-ratings Grid -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-6 bg-slate-50 dark:bg-slate-800/50 p-5 rounded-xl">
<!-- Stitching Quality -->
<div class="space-y-2">
<div class="flex justify-between items-center">
<span class="text-sm font-medium">Stitching Quality</span>
<span class="text-xs text-primary font-bold">4.8</span>
</div>
<div class="flex h-1.5 w-full overflow-hidden rounded-full bg-slate-200 dark:bg-slate-700">
<div class="rounded-full bg-primary" style="width: 90%;"></div>
</div>
</div>
<!-- Fabric Match -->
<div class="space-y-2">
<div class="flex justify-between items-center">
<span class="text-sm font-medium">Fabric Match</span>
<span class="text-xs text-primary font-bold">5.0</span>
</div>
<div class="flex h-1.5 w-full overflow-hidden rounded-full bg-slate-200 dark:bg-slate-700">
<div class="rounded-full bg-primary" style="width: 100%;"></div>
</div>
</div>
<!-- Communication -->
<div class="space-y-2">
<div class="flex justify-between items-center">
<span class="text-sm font-medium">Communication</span>
<span class="text-xs text-primary font-bold">4.2</span>
</div>
<div class="flex h-1.5 w-full overflow-hidden rounded-full bg-slate-200 dark:bg-slate-700">
<div class="rounded-full bg-primary" style="width: 80%;"></div>
</div>
</div>
<!-- On Time -->
<div class="space-y-2">
<div class="flex justify-between items-center">
<span class="text-sm font-medium">On Time Delivery</span>
<span class="text-xs text-primary font-bold">4.5</span>
</div>
<div class="flex h-1.5 w-full overflow-hidden rounded-full bg-slate-200 dark:bg-slate-700">
<div class="rounded-full bg-primary" style="width: 85%;"></div>
</div>
</div>
</div>
<!-- Review Textarea -->
<div class="space-y-2">
<label class="text-sm font-semibold text-slate-700 dark:text-slate-300">Your Review</label>
<textarea class="w-full min-h-[120px] rounded-lg border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-900 dark:text-slate-100 focus:ring-primary focus:border-primary p-4 text-sm" placeholder="Share your thoughts on the fit, fabric, and overall craftsmanship..."></textarea>
</div>
<!-- Photo Upload Zone -->
<div class="space-y-2">
<label class="text-sm font-semibold text-slate-700 dark:text-slate-300">Add Photos</label>
<div class="flex gap-4">
<button class="flex flex-col items-center justify-center w-24 h-24 border-2 border-dashed border-slate-200 dark:border-slate-700 rounded-xl hover:border-primary hover:bg-primary/5 transition-all text-slate-400 hover:text-primary">
<span class="material-symbols-outlined !text-3xl">add_a_photo</span>
<span class="text-[10px] mt-1 font-medium">Upload</span>
</button>
<!-- Image Preview Placeholder -->
<div class="relative w-24 h-24 rounded-xl overflow-hidden group">
<img class="w-full h-full object-cover" data-alt="Close up of high quality garment stitching" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBYYP7WzDZqy3EciSRtFcvmKbwb6zbTDCma8JaBVZRU4qS8I9qFWZqLkDh-GDoqgpmWFx9rqhq6idFgS6EnFtkH8xhTfwx5phxQhvgN5eiTOEH83GxLqt8EBDuPZka9uv7W9InaCEE7eZB5CkpeVAzmneo7ZsamN9mlghol8zL2q0QSVzMg6GX1lwjkvY-ygAD4fyq6MxnjXGLW9B_F0cv7NuZwXsqoTT-pmGbR4_ykD_vOiHWRWC3tNZc32vCrSIL0IGhyfy0qokpT"/>
<button class="absolute top-1 right-1 bg-black/50 text-white rounded-full p-0.5 opacity-0 group-hover:opacity-100 transition-opacity">
<span class="material-symbols-outlined !text-sm">close</span>
</button>
</div>
<div class="relative w-24 h-24 rounded-xl overflow-hidden group">
<img class="w-full h-full object-cover" data-alt="Customer wearing custom tailored blazer" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAFSSpc_lBBpb6j2JapTL0OfQQAeaRQg9_PgY_v5dmmscXJAQYUNFjCNntpq8savkvdBiBQNmej0sQ0wa6W-hI_vdPHVGplHBT8DBi0nqNhAbtKR7g6wUJsnzQEvQj4bTTjH3sHP3eJSVT7bCPEh6h6ro6CKeQw3VrWYKvH5o-brDR7hMobQL3Tkw9_jNkTtrQivOsjeRDkm-HUIZFAtZkmTCszv7SwNLPlb_IwLghxrUtrn8EBmgIJnU6_b6zFNvrOS7IuqL2zre2s"/>
<button class="absolute top-1 right-1 bg-black/50 text-white rounded-full p-0.5 opacity-0 group-hover:opacity-100 transition-opacity">
<span class="material-symbols-outlined !text-sm">close</span>
</button>
</div>
</div>
</div>
</div>
<!-- Footer Action -->
<div class="p-6 border-t border-slate-100 dark:border-slate-800 bg-slate-50/50 dark:bg-slate-900/50">
<button class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-4 rounded-lg shadow-lg shadow-primary/20 transition-all flex items-center justify-center gap-2">
<span>Submit Review</span>
<span class="material-symbols-outlined">send</span>
</button>
<p class="text-center text-[11px] text-slate-400 mt-4">By submitting, you agree to our Community Guidelines and Terms of Service.</p>
</div>
</div>
<!-- Order Reference Toast (Bottom) -->
<div class="mt-8 flex items-center gap-4 bg-white/10 backdrop-blur-md px-6 py-3 rounded-full border border-white/20 text-white text-sm">
<span class="font-medium opacity-60 text-slate-900 dark:text-slate-100">Order Ref: #TK-88219</span>
<div class="h-4 w-px bg-white/20"></div>
<span class="text-primary font-bold">Custom Silk Suit</span>
</div>
</div>
</body></html>
